{% extends "base.html" %}

{% block content %}
<h2>Edit Asset</h2>

{% if error_message %}
    <p style="color: red; font-weight: bold;">{{ error_message }}</p>
{% endif %}

<form method="POST" class="form-layout">
    <div class="form-row">
        <label for="asset_name">Asset Name:</label>
        <input type="text" id="asset_name" name="asset_name" value="{{ asset[1] }}" required>
    </div>

    <div class="form-row">
        <label for="asset_type">Asset Type:</label>
        <input type="text" id="asset_type" name="asset_type" value="{{ asset[2] }}" required>
    </div>

    <div class="form-row">
        <label for="serial_number">Serial Number:</label>
        <input type="text" id="serial_number" name="serial_number" value="{{ asset[3] }}" required>
    </div>

    <div class="form-row">
        <label for="location_id">Location:</label>
        <select id="location_id" name="location_id" required>
            {% for location in locations %}
                <option value="{{ location[0] }}"
                    {% if location[0] == asset[4] %}selected{% endif %}>
                    {{ location[1] }} - Room {{ location[2] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit">Update Asset</button>
    </div>
</form>

<a class="back-link" href="/assets">← Back to Assets</a>
{% endblock %}
