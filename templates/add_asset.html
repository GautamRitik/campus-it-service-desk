{% extends "base.html" %}

{% block content %}
<h2>Add Asset</h2>

{% if error_message %}
    <p style="color: red; font-weight: bold;">{{ error_message }}</p>
{% endif %}

<form method="POST" action="/add_asset" class="form-layout">
    <div class="form-row">
        <label for="asset_name">Asset Name:</label>
        <input type="text" id="asset_name" name="asset_name" required
               value="{{ entered_asset_name if entered_asset_name else '' }}">
    </div>

    <div class="form-row">
        <label for="asset_type">Asset Type:</label>
        <input type="text" id="asset_type" name="asset_type" required
               value="{{ entered_asset_type if entered_asset_type else '' }}">
    </div>

    <div class="form-row">
        <label for="serial_number">Serial Number:</label>
        <input type="text" id="serial_number" name="serial_number" required
               value="{{ entered_serial_number if entered_serial_number else '' }}">
    </div>

    <div class="form-row">
        <label for="location_id">Location:</label>
        <select id="location_id" name="location_id" required>
            {% for location in locations %}
                <option value="{{ location[0] }}"
                    {% if entered_location_id and entered_location_id|string == location[0]|string %}selected{% endif %}>
                    {{ location[1] }} - Room {{ location[2] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit">Add Asset</button>
    </div>
</form>

<a class="back-link" href="/assets">← Back to Assets</a>
{% endblock %}
