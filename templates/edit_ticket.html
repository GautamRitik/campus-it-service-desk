{% extends "base.html" %}

{% block content %}
<h2>Edit Ticket</h2>

<form method="POST" class="form-layout">
    <div class="form-row">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ ticket[1] }}" required>
    </div>

    <div class="form-row">
        <label for="description">Description:</label>
        <textarea id="description" name="description" rows="4" required>{{ ticket[2] }}</textarea>
    </div>

    <div class="form-row">
        <label for="created_by">Created By:</label>
        <select id="created_by" name="created_by" required>
            {% for user in users %}
                <option value="{{ user[0] }}"
                    {% if user[0] == ticket[3] %}selected{% endif %}>
                    {{ user[1] }} {{ user[2] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <label for="assigned_to">Assigned To:</label>
        <select id="assigned_to" name="assigned_to" required>
            {% for user in users %}
                <option value="{{ user[0] }}"
                    {% if user[0] == ticket[4] %}selected{% endif %}>
                    {{ user[1] }} {{ user[2] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <label for="status_id">Status:</label>
        <select id="status_id" name="status_id" required>
            {% for status in statuses %}
                <option value="{{ status[0] }}"
                    {% if status[0] == ticket[5] %}selected{% endif %}>
                    {{ status[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-row">
        <label for="asset_id">Asset:</label>
        <select id="asset_id" name="asset_id" required>
            {% for asset in assets %}
                <option value="{{ asset[0] }}"
                    {% if asset[0] == ticket[6] %}selected{% endif %}>
                    {{ asset[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-actions">
        <button type="submit">Update Ticket</button>
    </div>
</form>

<a class="back-link" href="/tickets">← Back to Tickets</a>
{% endblock %}
