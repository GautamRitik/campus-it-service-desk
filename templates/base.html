<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus IT Service Desk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">Campus IT Service Desk</a>

            <div class="nav-links">
                <a href="/" class="{% if request.path == '/' %}active-link{% endif %}">Home</a>
                <a href="/assets" class="{% if '/assets' in request.path %}active-link{% endif %}">Assets</a>
                <a href="/tickets" class="{% if '/tickets' in request.path %}active-link{% endif %}">Tickets</a>
            </div>
        </div>
    </nav>

    <main class="page-container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
